# Morning gate worker — deploy with `npx wrangler deploy` from this directory.
name = "market-gate"
main = "worker.js"
compatibility_date = "2026-07-01"

[triggers]
# 04:00 UTC = 9:30 IST (IST has no DST, offset never drifts), Mon–Fri.
# 15 min after open: even a delayed Yahoo feed has the 9:15 bar by then.
# NSE holidays are handled in the worker: no fresh session → holiday note.
crons = ["0 4 * * 1-5"]
