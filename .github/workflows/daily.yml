# Zero-cost cloud runner: fetches the day's data and commits it back to the repo.
# Note: NSE sometimes blocks datacenter IPs on www.nseindia.com APIs; the
# archives host (bhavcopy) is usually fine. If the snapshot steps start
# failing from Actions, keep those local and let Actions handle bhavcopy only.
name: daily-market-data

on:
  schedule:
    # GitHub crons are best-effort and get dropped under load, especially on
    # popular minutes — odd minutes + a retry an hour later, all idempotent.
    # The 20:30 IST local failsafe covers the day both attempts are dropped.
    - cron: "52 13 * * 1-5" # 19:22 IST, after NSE publishes the day's bhavcopy
    - cron: "37 14 * * 1-5" # 20:07 IST retry
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python fetch_daily.py
      - name: Self-heal any bhavcopy gaps from dropped runs
        run: python backfill.py --days 7
      - name: Build dashboard for GitHub Pages
        run: |
          python dashboard.py
          mkdir -p docs
          cp out/dashboard.html docs/index.html
      - name: Commit data and dashboard
        run: |
          git config user.name "market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "data: $(date -u +%F)"
          git push
